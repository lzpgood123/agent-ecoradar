  readme_preview: '# gstack


    > "I don''t think I''ve typed like a line of code probably since December, basically,
    which is an extremely large change." — [Andrej Karpathy](https://fortune.com/2026/03/21/andrej-karpathy-openai-cofounder-ai-agents-coding-state-of-psychosis-openclaw/),
    No Priors podcast, March 2026


    When I heard Karpathy say this, I wanted to find out how. How does one person
    ship like a team of twenty? Peter Steinberger built [OpenClaw](https://github.com/openclaw/openclaw)
    — 247K GitHub stars — essentially solo with AI agents. The revolution is here.
    A single builder with the right tooling can move faster than a traditional team.


    I''m [Garry Tan](https://x.com/garrytan), President & CEO of [Y Combinator](https://www.ycombinator.com/).
    I''ve worked with thousands of startups — Coinbase, Instacart, Rippling — when
    they were one or two people in a garage. Before YC, I was one of the first eng/PM/designers
    at Palantir, cofounded Posterous (sold to Twitter), and built Bookface, YC''s
    internal social network.


    **gstack is my answer.** I''ve been building products for twenty years, and right
    now I''m shipping more products than I ever have. In the last 60 days: 3 production
    services, 40+ shipped features, part-time, while running YC full-time. On logical
    code change — not raw LOC, which AI inflates — my 2026 run rate is **~810× my
    2013 pace** (11,417 vs 14 logical lines/day). Year-to-date (through April 18),
    2026 has already produced **240× the entire 2013 year**. Measured across 40 public
    + private `garrytan/*` repos including Bookface, after excluding one demo repo.
    AI wrote most of it. The point isn''t who typed it, it''s what shipped.


    > The LOC critics aren''t wrong that raw line counts inflate with AI. They are
    wrong that normalized-for-inflation, I''m less productive. I''m more productive,
    by a lot. Full methodology, caveats, and reproduction script: **[On the LOC Controversy](docs/ON_THE_LOC_CONTROVERSY.md)**.


    **2026 — 1,237 contributions and counting:**


    ![GitHub contributions'
