  readme_preview: "<p>\n  <a href=\"https://www.aihero.dev/s/skills-newsletter\">\n\
    \    <picture>\n      <source media=\"(prefers-color-scheme: dark)\" srcset=\"\
    https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skills-repo-dark_2x.png\"\
    >\n      <source media=\"(prefers-color-scheme: light)\" srcset=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\"\
    >\n      <img alt=\"Skills\" src=\"https://res.cloudinary.com/total-typescript/image/upload/v1777382277/skill-repo-light_2x.png\"\
    \ width=\"369\">\n    </picture>\n  </a>\n</p>\n\n# Skills For Real Engineers\n\
    \n[![skills.sh](https://skills.sh/b/mattpocock/skills)](https://skills.sh/mattpocock/skills)\n\
    \nMy agent skills that I use every day to do real engineering - not vibe coding.\n\
    \nDeveloping real applications is hard. Approaches like GSD, BMAD, and Spec-Kit\
    \ try to help by owning the process. But while doing so, they take away your control\
    \ and make bugs in the process hard to resolve.\n\nThese skills are designed to\
    \ be small, easy to adapt, and composable. They work with any model. They're based\
    \ on decades of engineering experience. Hack around with them. Make them your\
    \ own. Enjoy.\n\nIf you want to keep up with changes to these skills, and any\
