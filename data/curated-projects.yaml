  readme_preview: "# Chrome DevTools for agents\n\n[![npm chrome-devtools-mcp package](https://img.shields.io/npm/v/chrome-devtools-mcp.svg)](https://npmjs.org/package/chrome-devtools-mcp)\n\
    \nChrome DevTools for agents (`chrome-devtools-mcp`) lets your coding agent (such\
    \ as Antigravity, Claude, Cursor or Copilot)\ncontrol and inspect a live Chrome\
    \ browser. It acts as a Model-Context-Protocol\n(MCP) server, giving your AI coding\
    \ assistant access to the full power of\nChrome DevTools for reliable automation,\
    \ in-depth debugging, and performance analysis.\nA [CLI](docs/cli.md) is also\
    \ provided for use without MCP.\n\n## [Tool reference](./docs/tool-reference.md)\
    \ | [Changelog](./CHANGELOG.md) | [Contributing](./CONTRIBUTING.md) | [Troubleshooting](./docs/troubleshooting.md)\
    \ | [Design Principles](./docs/design-principles.md)\n\n## Key features\n\n- **Get\
    \ performance insights**: Uses [Chrome\n  DevTools](https://github.com/ChromeDevTools/devtools-frontend)\
    \ to record\n  traces and extract actionable performance insights.\n- **Advanced\
    \ browser debugging**: Analyze network requests, take screenshots and\n  check\
    \ browser console messages (with source-mapped stack traces).\n- **Reliable automation**.\
    \ Uses\n  [puppeteer](https://github.com/puppeteer/puppeteer) to automate actions\
    \ in\n  Chrome and automatically wait for action results.\n\n## Disclaimers\n\n\
    `chrome-devtools-mcp` exposes content of the browser instance to the MCP clients\n\
    allowing them to inspect, debug, and modify any data in the browser or DevTools.\n\
    Avoid sharing sensitive or personal information that you don't want to share with\n\
    MCP clients.\n\n`chrome-devtools-mcp` officially supports Google Chrome and [Chrome\
    \ for Testing](https://developer.chrome.com/blog/chrome-for-testing/) only.\n\
    Other Chromium-based browsers may work, but this is not guaranteed, and you may\
    \ encounter unexpected behavior. Use at your own discretion.\nWe are committed\
    \ to providing fixes and support for the latest version of [Extended Stable Chrome](https://chromiumdash.appspot.com/schedule"
