  readme_preview: "# Superpowers\n\nSuperpowers is a complete software development\
    \ methodology for your coding agents, built on top of a set of composable skills\
    \ and some initial instructions that make sure your agent uses them.\n\n\n## We're\
    \ Hiring!\n\nWe're hiring someone to help out full time with Superpowers community\
    \ and code work. \nYou can read about the job at https://primeradiant.com/jobs/superpowers-community-engineer/\n\
    If this sounds like someone you know, definitely send them our way.\n\n## Quickstart\n\
    \nGive your agent Superpowers: [Claude Code](#claude-code), [Antigravity](#antigravity),\
    \ [Codex App](#codex-app), [Codex CLI](#codex-cli), [Cursor](#cursor), [Factory\
    \ Droid](#factory-droid), [GitHub Copilot CLI](#github-copilot-cli), [Kimi Code](#kimi-code),\
    \ [OpenCode](#opencode), [Pi](#pi).\n\n## How it works\n\nIt starts from the moment\
    \ you fire up your coding agent. As soon as it sees that you're building something,\
    \ it *doesn't* just jump into trying to write code. Instead, it steps back and\
    \ asks you what you're really trying to do. \n\nOnce it's teased a spec out of\
    \ the conversation, it shows it to you in chunks short enough to actually read\
    \ and digest. \n\nAfter you've signed off on the design, your agent puts together\
    \ an implementation plan that's clear enough for an enthusiastic junior engineer\
    \ with poor taste, no judgement, no project context, and an aversion to testing\
    \ to follow. It emphasizes true red/green TDD, YAGNI (You Aren't Gonna Need It),\
    \ and DRY. \n\nNext up, once you say \"go\", it launches a *subagent-driven-development*\
    \ process, having agents work through each engineering task, inspecting and reviewing\
    \ their work, and continuing forward. It's not uncommon for your agent to work\
    \ autonomously for a couple hours at a time without deviating from the plan you\
    \ put together.\n\nThere's a bunch more to it, but that's the core of the system.\
    \ And because the skills trigger automatically, you don't need to do anything\
    \ special. Your coding agent just has Superpowers.\n\n## Commercial Services\n\
    \n"
