    # Learn Claude Code -- Harness Engineering for Real Agents


    ## Agency Comes from the Model. An Agent Product = Model + Harness.


    Before we write any code, one thing needs to be clear.


    **Agency -- the capacity to perceive, reason, and act -- comes from model training,
    not from external code orchestration.** But a working agent product needs both
    the model and the harness. The model is the driver. The harness is the vehicle.
    This repository teaches you how to build the vehicle.


    ### Where Agency Comes From


    At the core of every agent is a neural network -- a Transformer, an RNN, a trained
    function -- shaped by billions of gradient updates on sequences of perception,
    reasoning, and action. Agency was never bestowed by the surrounding code. It was
    learned during training.


    Humans are the original proof. A biological neural network, refined by millions
    of years of evolutionary pressure, perceives the world through senses, reasons
    through a brain, and acts through a body. When DeepMind, OpenAI, or Anthropic
    say "agent," they all mean the same core thing: **a model that learned to act
    through training, plus the infrastructure that lets it operate in a specific environment.**


    The historical record is unambiguous:


    - **2013 -- DeepMind DQN plays Atari.** A single neural network, receiving only
    raw pixels and game scores, learned 7 Atari 2600 games -- surpassing prior algorithms
    and beating human experts in 3 of them. By 2015, scaled to [49 games at professional
    tester level](https://www.nature.com/articles/nature14236), published in *Nature*.
    No game-specific rules. One model, learning from experience.


